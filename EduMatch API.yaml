openapi: 3.0.3
info:
  title: EduMatch API
  version: 1.0.0
  description: API documentation for EduMatch - Platform Mentoring Digital
paths:
  /api/admin/all-mentees/:
    get:
      operationId: admin_all_mentees_list
      description: |-
        GET: Daftar semua mentee (paginated, bisa di-search & filter universitas).

        POST /mentees/: Admin membuat akun mentee baru.
        JANGAN kirim POST ke /mentees/{id}/ — gunakan MenteeDetailView untuk PUT/DELETE.
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: university
        schema:
          type: string
      tags:
      - admin
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAdminUserList'
          description: ''
    post:
      operationId: admin_all_mentees_create
      description: Gunakan endpoint ini TANPA ID di path (POST /mentees/). POST ke
        /mentees/{id}/ akan ditolak 405.
      summary: Tambah mentee baru
      tags:
      - admin
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                email:
                  type: string
                password:
                  type: string
                  default: mentee123
                university:
                  type: string
                phone:
                  type: string
              required:
              - username
              - email
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUser'
          description: ''
  /api/admin/all-mentors/:
    get:
      operationId: admin_all_mentors_list
      description: |-
        GET: Daftar mentor terverifikasi (paginated, bisa di-search & filter universitas).

        POST /mentors/: Admin membuat akun mentor baru (otomatis terverifikasi).
        JANGAN kirim POST ke /mentors/{id}/ — gunakan MentorDetailView untuk PUT/DELETE.
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: university
        schema:
          type: string
      tags:
      - admin
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAdminUserList'
          description: ''
    post:
      operationId: admin_all_mentors_create
      description: Gunakan endpoint ini TANPA ID di path (POST /mentors/). POST ke
        /mentors/{id}/ akan ditolak 405.
      summary: Tambah mentor baru (langsung terverifikasi)
      tags:
      - admin
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                email:
                  type: string
                password:
                  type: string
                  default: mentor123
                university:
                  type: string
                phone:
                  type: string
              required:
              - username
              - email
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUser'
          description: ''
  /api/admin/bookings/:
    get:
      operationId: admin_bookings_list
      description: Melihat seluruh booking dari semua mentee & mentor, bisa difilter
        berdasarkan status.
      summary: Daftar semua booking di platform
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - accepted
          - cancelled
          - completed
          - ongoing
          - paid
          - pending
          - pending_payment
          - rejected
        description: |-
          * `pending_payment` - Menunggu Pembayaran
          * `pending` - Menunggu
          * `accepted` - Diterima
          * `rejected` - Ditolak
          * `ongoing` - Berlangsung
          * `completed` - Selesai
          * `cancelled` - Dibatalkan
          * `paid` - Lunas
      tags:
      - admin
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAdminBookingList'
          description: ''
  /api/admin/me/:
    get:
      operationId: admin_me_retrieve
      summary: Info user yang sedang login (admin)
      tags:
      - admin
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/admin/mentees/:
    get:
      operationId: admin_mentees_list
      description: |-
        GET: Daftar semua mentee (paginated, bisa di-search & filter universitas).

        POST /mentees/: Admin membuat akun mentee baru.
        JANGAN kirim POST ke /mentees/{id}/ — gunakan MenteeDetailView untuk PUT/DELETE.
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: university
        schema:
          type: string
      tags:
      - admin
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAdminUserList'
          description: ''
    post:
      operationId: admin_mentees_create
      description: Gunakan endpoint ini TANPA ID di path (POST /mentees/). POST ke
        /mentees/{id}/ akan ditolak 405.
      summary: Tambah mentee baru
      tags:
      - admin
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                email:
                  type: string
                password:
                  type: string
                  default: mentee123
                university:
                  type: string
                phone:
                  type: string
              required:
              - username
              - email
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUser'
          description: ''
  /api/admin/mentees/{user_id}/:
    put:
      operationId: admin_mentees_update
      summary: Update atau hapus mentee berdasarkan ID
      parameters:
      - in: path
        name: user_id
        schema:
          type: integer
        description: ID mentee
        required: true
      tags:
      - admin
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                email:
                  type: string
                password:
                  type: string
                university:
                  type: string
                phone:
                  type: string
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    delete:
      operationId: admin_mentees_destroy
      summary: Update atau hapus mentee berdasarkan ID
      parameters:
      - in: path
        name: user_id
        schema:
          type: integer
        description: ID mentee
        required: true
      tags:
      - admin
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/admin/mentors/:
    get:
