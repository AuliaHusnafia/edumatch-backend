  /api/admin/payments/:
    get:
      operationId: admin_payments_list
      description: Riwayat pembayaran lengkap dengan breakdown nominal, komisi platform,
        dan pendapatan mentor.
      summary: Daftar semua transaksi pembayaran
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - failed
          - pending
          - success
        description: |-
          * `pending` - Menunggu Pembayaran
          * `success` - Berhasil
          * `failed` - Gagal
      tags:
      - admin
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAdminPaymentList'
          description: ''
  /api/admin/pending-mentors/:
    get:
      operationId: admin_pending_mentors_list
      description: |-
        GET: Daftar mentor yang mendaftar tapi belum diverifikasi admin (paginated, bisa di-search).

        POST: Setujui atau tolak pendaftaran mentor.
        Body: {"mentor_id": int, "action": "approve" | "reject"}
        - approve → mentor.is_verified jadi True
        - reject  → akun mentor dihapus permanen
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: university
        schema:
          type: string
      tags:
      - admin
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAdminUserList'
          description: ''
    post:
      operationId: admin_pending_mentors_create
      description: |-
        GET: Daftar mentor yang mendaftar tapi belum diverifikasi admin (paginated, bisa di-search).

        POST: Setujui atau tolak pendaftaran mentor.
        Body: {"mentor_id": int, "action": "approve" | "reject"}
        - approve → mentor.is_verified jadi True
        - reject  → akun mentor dihapus permanen
      summary: Setujui atau tolak pendaftaran mentor
      tags:
      - admin
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                mentor_id:
                  type: integer
                action:
                  type: string
                  enum:
                  - approve
                  - reject
              required:
              - mentor_id
              - action
            examples:
              SetujuiMentor:
                value:
                  mentor_id: 5
                  action: approve
                summary: Setujui mentor
              TolakMentor:
                value:
                  mentor_id: 5
                  action: reject
                summary: Tolak mentor
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUser'
              examples:
                SetujuiMentor:
                  value:
                    mentor_id: 5
                    action: approve
                  summary: Setujui mentor
                TolakMentor:
                  value:
                    mentor_id: 5
                    action: reject
                  summary: Tolak mentor
          description: ''
  /api/admin/stats/:
    get:
      operationId: admin_stats_retrieve
      description: 'Mengembalikan ringkasan angka penting untuk dashboard admin: total
        pengguna, mentor yang sudah/belum diverifikasi, total booking, sesi selesai/sudah
        dibayar, dan total komisi platform dari semua transaksi yang berhasil.'
      summary: Statistik ringkasan platform
      tags:
      - admin
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/admin/transactions/:
    get:
      operationId: admin_transactions_list
      description: Hanya menampilkan pembayaran dengan status sukses — untuk laporan
        komisi platform dan rekonsiliasi keuangan.
      summary: Riwayat transaksi sukses (untuk laporan keuangan)
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - failed
          - pending
          - success
        description: |-
          * `pending` - Menunggu Pembayaran
          * `success` - Berhasil
          * `failed` - Gagal
      tags:
      - admin
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAdminTransactionList'
          description: ''
  /api/admin/withdraw-requests/:
    get:
      operationId: admin_withdraw_requests_list
      description: |-
        GET: Daftar permintaan pencairan dana dari mentor (paginated, filter by status).

        POST: Setujui atau tolak permintaan pencairan.
        Body: {"withdrawal_id": int, "action": "approve" | "reject", "admin_note": str (opsional)}
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - approved
          - pending
          - rejected
        description: |-
          * `pending` - Menunggu Persetujuan
          * `approved` - Disetujui
          * `rejected` - Ditolak
      tags:
      - admin
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAdminWithdrawalList'
          description: ''
    post:
      operationId: admin_withdraw_requests_create
      description: |-
        GET: Daftar permintaan pencairan dana dari mentor (paginated, filter by status).

        POST: Setujui atau tolak permintaan pencairan.
        Body: {"withdrawal_id": int, "action": "approve" | "reject", "admin_note": str (opsional)}
      summary: Setujui atau tolak permintaan pencairan dana
      tags:
      - admin
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                withdrawal_id:
                  type: integer
                action:
                  type: string
                  enum:
                  - approve
                  - reject
                admin_note:
                  type: string
              required:
              - withdrawal_id
              - action
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminWithdrawal'
          description: ''
  /api/auth/login/:
    post:
      operationId: auth_login_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenObtainPair'
          description: ''
  /api/auth/me/:
    get:
      operationId: auth_me_retrieve
      tags:
      - auth
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/auth/refresh/:
    post:
      operationId: auth_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/auth/register/:
    post:
      operationId: auth_register_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Register'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Register'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Register'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Register'
          description: ''
  /api/mentee/book/:
