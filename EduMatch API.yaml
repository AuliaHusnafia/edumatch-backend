          format: uri
          nullable: true
          maxLength: 200
        invoice_amount:
          type: number
          format: double
          maximum: 100000000
          minimum: -100000000
          exclusiveMaximum: true
          exclusiveMinimum: true
        payment_status:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
