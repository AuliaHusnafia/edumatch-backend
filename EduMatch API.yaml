          description: ''
  /api/mentee/mentors/{mentor_id}/:
    get:
      operationId: mentee_mentors_retrieve
      parameters:
      - in: path
        name: mentor_id
        schema:
          type: integer
        required: true
      tags:
      - mentee
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MentorList'
          description: ''
  /api/mentee/ongoing-sessions/:
    get:
      operationId: mentee_ongoing_sessions_list
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
