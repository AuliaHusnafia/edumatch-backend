components:
  schemas:
    AdminBooking:
      type: object
      description: Dipakai untuk AllBookingsView — ambil invoice_amount asli dari
        Booking, bukan hardcode
      properties:
        id:
          type: integer
          readOnly: true
        mentee_name:
          type: string
          maxLength: 100
        mentor_name:
          type: string
          maxLength: 100
        date:
          type: string
          format: date-time
        status:
          $ref: '#/components/schemas/StatusC96Enum'
        invoice_amount:
          type: number
          format: double
          maximum: 100000000
          minimum: -100000000
          exclusiveMaximum: true
          exclusiveMinimum: true
        payment_status:
          type: string
          readOnly: true
      required:
      - date
      - id
      - mentee_name
      - mentor_name
      - payment_status
    AdminPayment:
      type: object
      description: Dipakai untuk AllPaymentsView — langsung dari model Payment asli,
        bukan dari Booking
      properties:
        id:
          type: integer
          readOnly: true
        order_id:
          type: string
          maxLength: 100
        mentee_name:
          type: string
          readOnly: true
        mentor_name:
          type: string
          readOnly: true
        amount:
          type: number
          format: double
          maximum: 100000000
          minimum: -100000000
          exclusiveMaximum: true
          exclusiveMinimum: true
        platform_fee:
          type: number
          format: double
          maximum: 100000000
          minimum: -100000000
          exclusiveMaximum: true
          exclusiveMinimum: true
        mentor_revenue:
          type: number
          format: double
          maximum: 100000000
          minimum: -100000000
          exclusiveMaximum: true
          exclusiveMinimum: true
        status:
          $ref: '#/components/schemas/AdminPaymentStatusEnum'
        paid_at:
          type: string
          format: date-time
          nullable: true
      required:
      - amount
      - id
      - mentee_name
      - mentor_name
      - order_id
    AdminPaymentStatusEnum:
      enum:
      - pending
      - success
      - failed
      type: string
      description: |-
        * `pending` - Menunggu Pembayaran
        * `success` - Berhasil
        * `failed` - Gagal
    AdminTransaction:
      type: object
      description: Dipakai untuk TransactionsView — sama seperti Payment tapi format
        field beda (untuk kompatibilitas frontend lama)
      properties:
        order_id:
          type: string
          maxLength: 100
        mentee:
          type: string
          readOnly: true
        mentor:
          type: string
          readOnly: true
        nominal:
          type: number
          format: double
          maximum: 100000000
          minimum: -100000000
          exclusiveMaximum: true
          exclusiveMinimum: true
        komisi:
          type: number
          format: double
          maximum: 100000000
          minimum: -100000000
          exclusiveMaximum: true
          exclusiveMinimum: true
        mentor_dapat:
          type: number
          format: double
          maximum: 100000000
          minimum: -100000000
          exclusiveMaximum: true
          exclusiveMinimum: true
        status:
          type: string
          readOnly: true
        waktu:
          type: string
          readOnly: true
      required:
      - komisi
      - mentee
      - mentor
      - mentor_dapat
      - nominal
      - order_id
      - status
      - waktu
    AdminUser:
      type: object
      description: Dipakai untuk PendingMentorsView, AllMentorsView, AllMenteesView
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          title: Nama pengguna
          description: Wajib. 150 karakter atau sedikit. Hanya huruf, angka, dan @/./+/-/_.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          maxLength: 254
        university:
          type: string
          readOnly: true
        phone:
          type: string
          readOnly: true
        date_joined:
          type: string
          readOnly: true
      required:
      - date_joined
      - email
      - id
      - phone
      - university
      - username
    AdminWithdrawal:
      type: object
      description: Dipakai untuk WithdrawRequestsView
      properties:
        id:
          type: integer
          readOnly: true
        mentor_name:
          type: string
          readOnly: true
        mentor_email:
          type: string
          readOnly: true
        amount:
          type: number
          format: double
          maximum: 100000000
          minimum: -100000000
          exclusiveMaximum: true
          exclusiveMinimum: true
        gross_amount:
          type: number
          format: double
          maximum: 100000000
          minimum: -100000000
          exclusiveMaximum: true
          exclusiveMinimum: true
        admin_fee:
          type: number
          format: double
          maximum: 100000000
          minimum: -100000000
          exclusiveMaximum: true
          exclusiveMinimum: true
        bank_name:
          type: string
          maxLength: 50
        account_number:
          type: string
          maxLength: 50
        account_name:
          type: string
          maxLength: 100
        status:
          $ref: '#/components/schemas/Status1f3Enum'
        admin_note:
          type: string
        created_at:
          type: string
          readOnly: true
      required:
      - admin_fee
      - amount
      - created_at
      - gross_amount
      - id
      - mentor_email
      - mentor_name
    MenteeBooking:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        mentor_name:
          type: string
          maxLength: 100
        date:
          type: string
          format: date-time
        notes:
          type: string
        status:
