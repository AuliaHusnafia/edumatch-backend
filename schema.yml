components:
  schemas:
    MenteeBooking:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        mentor_name:
          type: string
          maxLength: 100
        date:
          type: string
          format: date-time
        notes:
          type: string
        status:
          $ref: '#/components/schemas/StatusEnum'
        status_display:
          type: string
          readOnly: true
        meeting_link:
          type: string
          format: uri
          nullable: true
          maxLength: 200
        invoice_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        payment_status:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - date
      - id
      - mentor_name
      - payment_status
      - status_display
    MentorBooking:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        mentee_name:
          type: string
          maxLength: 100
        date:
          type: string
          format: date-time
        notes:
          type: string
        status:
          $ref: '#/components/schemas/StatusEnum'
        meeting_link:
          type: string
          format: uri
          nullable: true
          maxLength: 200
        invoice_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
      required:
      - date
      - id
      - mentee_name
    MentorList:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          title: Nama pengguna
          description: Wajib. 150 karakter atau sedikit. Hanya huruf, angka, dan @/./+/-/_.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          title: Alamat email
          maxLength: 254
        university:
          type: string
          maxLength: 200
        skills:
          type: string
          readOnly: true
        price_per_session:
          type: integer
          readOnly: true
        bio:
          type: string
          readOnly: true
        education:
          type: string
          readOnly: true
        available_slots:
          readOnly: true
      required:
      - available_slots
      - bio
      - education
      - id
      - price_per_session
      - skills
      - username
    MentorProfile:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
        university:
          type: string
          readOnly: true
        skills:
          type: string
        price_per_session:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        bio:
          type: string
        education:
          type: string
          maxLength: 255
        available_slots: {}
      required:
      - email
      - id
      - university
      - username
    PaginatedMenteeBookingList:
      type: object
      required:
      - count
      - results
      properties:
        count:
